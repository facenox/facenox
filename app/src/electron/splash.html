<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FACENOX</title>
    <link rel="stylesheet" href="./splash.css" />
  </head>

  <body>
    <div class="splash-container">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>

      <div class="splash-content">
        <div class="logo-wrapper">
          <div class="logo-glow"></div>

          <img
            class="logo"
            src="./logo.png"
            onerror="
              this.onerror = null
              this.src = '../../public/icons/logo.png'
            "
            alt="FACENOX" />
        </div>

        <div class="brand-block">
          <div class="brand">Facenox</div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const progressFill = document.getElementById("progress-fill")
      const progressTrack = document.querySelector(".progress-track")
      let currentProgress = 0
      let targetProgress = 0
      let animationFrameId = null
      let lastAnimationTime = performance.now()
      let hasShownProgress = false

      const renderProgress = () => {
        if (!progressFill) return
        progressFill.style.width = `${currentProgress}%`
      }

      const animateProgress = (timestamp) => {
        const deltaMs = Math.min(timestamp - lastAnimationTime, 48)
        lastAnimationTime = timestamp
        const distance = targetProgress - currentProgress

        if (Math.abs(distance) < 0.15) {
          currentProgress = targetProgress
          renderProgress()
          animationFrameId = null
          return
        }

        const timeConstant = targetProgress === 100 ? 95 : 180
        const smoothing = 1 - Math.exp(-deltaMs / timeConstant)
        const nextProgress = currentProgress + distance * smoothing

        currentProgress =
          targetProgress > currentProgress ?
            Math.min(nextProgress, targetProgress)
          : Math.max(nextProgress, targetProgress)

        renderProgress()
        animationFrameId = window.requestAnimationFrame(animateProgress)
      }

      const startProgressAnimation = () => {
        if (animationFrameId !== null) return
        lastAnimationTime = performance.now()
        animationFrameId = window.requestAnimationFrame(animateProgress)
      }

      const applyProgress = (progress) => {
        if (typeof progress === "number") {
          const clamped = Math.max(0, Math.min(100, progress))
          if (clamped > 0 && !hasShownProgress) {
            hasShownProgress = true
            progressTrack?.classList.add("is-visible")
          }
          if (clamped === 100) {
            targetProgress = 100
            currentProgress = 100
            if (animationFrameId !== null) {
              window.cancelAnimationFrame(animationFrameId)
              animationFrameId = null
            }
            renderProgress()
            window.requestAnimationFrame(() => {
              window.requestAnimationFrame(() => {
                window.facenoxElectron?.reportSplashRenderedProgress?.(100)
              })
            })
            return
          }

          targetProgress = clamped
          startProgressAnimation()
        }
      }

      renderProgress()

      if (window.facenoxElectron?.onSplashProgress) {
        window.facenoxElectron.onSplashProgress(({ progress }) => {
          applyProgress(progress)
        })
      }
    </script>
  </body>
</html>
